services:
  # ─────────────────────────────────────────────
  # App Meteor (correos-webapp)
  # ─────────────────────────────────────────────
  meteor-app:
    build:
      context: .
      dockerfile: Dockerfile.meteor
    ports:
      - "9090:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/correos
      - ROOT_URL=http://localhost:3000
      - PORT=3000
      - PRINTER_NAME=Canon_TS8300_USB
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped
    networks:
      - correos-net

  # ─────────────────────────────────────────────
  # Demonio Python (WebSocket + impresora)
  # ─────────────────────────────────────────────
  demonio-python:
    build:
      context: .
      dockerfile: Dockerfile.demonio
    ports:
      - "8000:8000"
    environment:
      - PRINTER_1=Canon_TS8300_USB
      - PRINTER_2=Canon_TS8300_USB
      - PRINTER_TICKET=Canon_TS8300_USB
    volumes:
      - ./demonio:/app
    networks:
      - correos-net

  # ─────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - correos-net

volumes:
  mongo-data:

networks:
  correos-net:
