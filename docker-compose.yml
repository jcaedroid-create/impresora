services:
  # ─────────────────────────────────────────────
  # App Meteor (correos-webapp)
  # ─────────────────────────────────────────────
  meteor-app:
    build:
      context: .
      dockerfile: Dockerfile.meteor
    ports:
      - "9090:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/correos
      - ROOT_URL=http://localhost:3000
      - PORT=3000
      - PRINTER_NAME=Canon_TS8300_USB
    depends_on:
      mongo:
        condition: service_healthy
      demonio-python:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - correos-net

  # ─────────────────────────────────────────────
  # Demonio Python (WebSocket + impresora)
  # ─────────────────────────────────────────────
  demonio-python:
    build:
      context: .
      dockerfile: Dockerfile.demonio
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - PRINTER_1=Canon_TS8300_USB
      - PRINTER_2=Canon_TS8300_USB
      - PRINTER_TICKET=Canon_TS8300_USB
    volumes:
      - ./demonio:/app
      - /var/run/cups:/var/run/cups  # Acceso al CUPS del host para imprimir
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8001)); s.close()"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - correos-net

  # ─────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - correos-net

volumes:
  mongo-data:

networks:
  correos-net:
